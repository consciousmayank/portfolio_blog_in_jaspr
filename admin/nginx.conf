server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — go_router needs every path to resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache canonical static assets aggressively; everything else is no-cache so
  # a redeploy of index.html doesn't get stuck behind stale CDN headers.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
