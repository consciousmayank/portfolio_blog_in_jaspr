# portfolio_blog — dynamic stack (Jaspr SSR + Dart API + Postgres + Flutter admin Web)
#
# Networks:
#   edge           external, shared with /srv/edge/ Caddy stack (terminates TLS)
#   portfolio-net  internal, isolates Postgres from the public edge
#
# Secrets come from /srv/portfolio_blog/.env on the VPS (gitignored). See README / handoff doc.
#
# Bring up order (first time):
#   docker network create edge          # one-time, only if not present
#   docker compose up -d postgres       # wait for healthcheck
#   docker compose up -d api            # runs migrations on boot
#   docker compose up -d web admin-web

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_DB: portfolio
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: portfolio-api:local
    container_name: portfolio-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - portfolio-net
      - edge
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    build:
      context: ./blog_website
      dockerfile: Dockerfile
    image: portfolio-web:local
    container_name: portfolio-web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
      PORT: "8080"
    networks:
      - edge
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  admin-web:
    build:
      context: ./admin
      dockerfile: Dockerfile
    image: portfolio-admin-web:local
    container_name: portfolio-admin-web
    restart: unless-stopped
    networks:
      - edge
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  edge:
    external: true
  portfolio-net:
    driver: bridge

volumes:
  pgdata:
