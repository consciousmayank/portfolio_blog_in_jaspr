name: Build and Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Install Jaspr CLI
        run: |
          dart pub global activate jaspr_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install Dart dependencies
        working-directory: blog_website
        run: dart pub get

      - name: Generate blog_posts.dart from Markdown files
        working-directory: blog_website
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Jaspr static site
        working-directory: blog_website
        run: jaspr build --sitemap-domain https://mayankjoshi.in

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync static build to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -avz --delete \
            blog_website/build/jaspr/ \
            "$VPS_USER@$VPS_HOST:/srv/portfolio_blog/blog_website/build/jaspr/"

      - name: Sync repo + restart PHP container on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -lc '
            set -euo pipefail
            cd /srv/portfolio_blog
            git fetch --depth=1 origin main
            git reset --hard origin/main
            docker compose up -d
          '
