name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs but don't cancel in-progress
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Install Dart dependencies
        working-directory: blog_website
        run: dart pub get

      - name: Generate blog_posts.dart from Markdown files
        working-directory: blog_website
        run: dart run build_runner build

      - name: Build Jaspr static site
        working-directory: blog_website
        run: dart run jaspr build --sitemap-domain https://mayankjoshi.in

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog_website/build/jaspr/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
