name: Build and Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, restart on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -lc '
            set -euo pipefail
            cd /srv/portfolio_blog
            git fetch --depth=1 origin main
            git reset --hard origin/main

            # Build images that change with this commit; postgres image is pulled, not built.
            docker compose build api web admin-web

            # Apply the new stack. API container runs migrations on start.
            docker compose up -d --remove-orphans

            # Smoke test: wait for /health to respond, max ~45s.
            for i in $(seq 1 15); do
              if docker compose exec -T api wget -qO- http://localhost:8080/health >/dev/null 2>&1; then
                echo "api healthy"; exit 0
              fi
              echo "waiting for api ($i/15)…"
              sleep 3
            done
            echo "api did not become healthy" >&2
            docker compose logs --tail=80 api >&2
            exit 1
          '
